<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawn of Civilization - Evolution</title>
    <style>
        :root { 
            --neon: #00d4ff;
            --stone-border: url('https://i.imgur.com/39S5u0O.png');
            --glow: 0 0 15px rgba(0, 212, 255, 0.6);
            --gold: #ffd700;
        }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* ЭКРАН ЗАГРУЗКИ */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #loader img { width: 180px; margin-bottom: 20px; }
        .bar { width: 150px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--neon); animation: load 3s forwards; }
        @keyframes load { to { width: 100%; } }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        #main-container {
            display: flex; flex: 1; width: 100%; height: 100%;
        }

        /* ИГРОВОЕ ПОЛЕ (VIEWPORT) */
        #viewport { 
            flex: 2; position: relative; 
            background: url('ui1.png') no-repeat center center; background-size: cover; 
            cursor: pointer; border: 15px solid transparent;
            border-image: url('https://i.imgur.com/bKj3Xo6.png') 30 round;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ПЕРСОНАЖ (СПРАЙТ) */
        #char-box {
            position: absolute; bottom: 15%; width: 160px; height: 160px;
            overflow: hidden; pointer-events: none;
        }
        #sprite {
            width: 1600px; /* 10 кадров по 160px */
            height: 100%;
            background: url('neanderthal_sheet.webp') no-repeat;
            background-size: cover; background-position: 0 0;
        }

        /* МАГАЗИН (SHOP) */
        #shop { 
            flex: 1; min-width: 300px; background: rgba(10, 10, 10, 0.95);
            border-left: 6px solid #222; padding: 15px;
            display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
        }

        /* АДАПТИВНОСТЬ ДЛЯ МОБИЛОК (ВЕРТИКАЛЬНАЯ) */
        @media (max-width: 850px) {
            #main-container { flex-direction: column; }
            #shop { border-left: none; border-top: 6px solid #222; min-width: 100%; height: 40%; }
            #viewport { flex: 1.5; }
        }

        /* UI ЭЛЕМЕНТЫ */
        #top-hub {
            width: 90%; background: rgba(0,0,0,0.8); margin-top: 15px;
            padding: 8px 15px; border-radius: 12px; display: flex;
            justify-content: space-between; align-items: center;
            border: 2px solid #333; z-index: 10;
        }
        .score-val { color: var(--neon); font-size: 22px; text-shadow: var(--glow); }

        .plate {
            background: #151515; border: 2px solid #333; padding: 10px;
            border-radius: 8px; transition: 0.3s;
        }
        .plate.locked { opacity: 0.4; pointer-events: none; }
        .plate.ready { opacity: 1; pointer-events: auto; border-color: var(--gold); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .buy-btn {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 8px 4px; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
        .ad-btn { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 10px; flex: 1; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="loader">
        <img src="Logo.png" alt="Logo">
        <div class="bar"><div class="fill"></div></div>
    </div>

    <div id="main-container">
        <div id="viewport" onclick="doTap()">
            <div id="top-hub">
                <div class="score-val" id="score">0⚡</div>
                <div style="color:var(--gold); font-size: 12px;">STONE AGE</div>
                <button onclick="event.stopPropagation(); toggleMute()" style="background:none; border:none; color:white; cursor:pointer;">🔊</button>
            </div>

            <div id="char-box">
                <div id="sprite"></div>
            </div>
            
            <div style="position:absolute; bottom:5%; font-size:10px; opacity:0.4;">TAP TO EVOLVE</div>
        </div>

        <div id="shop">
            <div class="plate locked" id="block1">
                <div style="font-size:11px; margin-bottom:5px;">TOOLS (30 CLICKS)</div>
                <div class="btn-grid">
                    <button class="buy-btn" onclick="buy(50, 2)">AXE (50⚡)</button>
                    <button class="buy-btn" onclick="buy(200, 5)">SPEAR (200⚡)</button>
                </div>
            </div>

            <div class="plate locked" id="block2">
                <div style="font-size:11px; margin-bottom:5px;">FIRE (2000 CLICKS)</div>
                <div class="btn-grid">
                    <button class="buy-btn" onclick="buy(3000, 50)">FRICTION (3k⚡)</button>
                    <button class="buy-btn" onclick="buy(10000, 200)">CAMPFIRE (10k⚡)</button>
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-top:auto; padding-top:10px;">
                <button class="ad-btn" onclick="watchAd(1.5)">[AD] BONUS x1.5</button>
                <button class="ad-btn" onclick="watchAd(2)" style="border-color:var(--neon); color:var(--neon);">[AD] RAID x2</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        let score = 0, power = 1, clicks = 0, adMult = 1;
        let frame = 0;
        const totalFrames = 10;
        const frameSize = 160;

        // Скрытие загрузки через 3 сек
        window.onload = () => setTimeout(() => document.getElementById('loader').style.display = 'none', 3000);

        function doTap() {
            score += power * adMult;
            clicks++;
            
            // Анимация спрайта
            frame = (frame + 1) % totalFrames;
            document.getElementById('sprite').style.backgroundPosition = `-${frame * frameSize}px 0`;
            
            update();
        }

        function update() {
            document.getElementById('score').innerText = Math.floor(score) + '⚡';
            
            // Разблокировка блоков
            if (clicks >= 30) document.getElementById('block1').className = "plate ready";
            if (clicks >= 2000) document.getElementById('block2').className = "plate ready";

            // Визуализация доступности покупок
            document.querySelectorAll('.buy-btn').forEach(btn => {
                let cost = parseInt(btn.innerText.match(/\d+/));
                if (btn.innerText.includes('k')) cost *= 1000;
                btn.style.borderColor = score >= cost ? "var(--neon)" : "#444";
                btn.style.color = score >= cost ? "#fff" : "#666";
            });
        }

        function buy(cost, p) {
            event.stopPropagation();
            if (score >= cost) {
                score -= cost;
                power += p;
                update();
            }
        }

        function watchAd(m) {
            event.stopPropagation();
            alert("Ad is playing..."); // Здесь будет вызов SDK CrazyGames
            adMult = m;
            setTimeout(() => { adMult = 1; }, 15000);
        }

        function startAudio() {
            let m = document.getElementById('bg-music');
            if (m.paused) m.play();
        }

        function toggleMute() {
            let m = document.getElementById('bg-music');
            m.muted = !m.muted;
        }
    </script>
</body>
</html>

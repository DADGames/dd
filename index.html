<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawn of Civilization - Evolution</title>
    <style>
        :root { 
            --neon: #00d4ff;
            --stone-border: url('https://i.imgur.com/39S5u0O.png');
            --glow: 0 0 15px rgba(0, 212, 255, 0.6);
            --gold: #ffd700;
        }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; height: 100vh; width: 100vw;
            overflow: hidden; 
        }

        /* ЭКРАН ЗАГРУЗКИ */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.5s;
        }
        #loading-screen img { max-width: 250px; width: 60%; margin-bottom: 20px; }
        .loader-bar { width: 200px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: var(--neon); animation: load 3s forwards; }
        @keyframes load { to { width: 100%; } }

        /* ПРЕДУПРЕЖДЕНИЕ О ПОВОРОТЕ */
        #rotate-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        @media screen and (orientation: portrait) {
            #rotate-warning { display: flex; }
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР (АДАПТИВНЫЙ FLEX) */
        #game-container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row; /* В landscape шоп справа */
        }

        #viewport { 
            flex: 1; /* Занимает все свободное место */
            position: relative; 
            background: url('ui1.png') no-repeat center center; 
            background-size: cover; 
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 10px;
            transition: background 0.3s ease;
            border: 15px solid transparent;
            border-image: url('https://i.imgur.com/bKj3Xo6.png') 30 round; 
            box-sizing: border-box;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ - ТЕПЕРЬ АДАПТИВНАЯ */
        #top-hub {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 90%; max-width: 800px;
            background: rgba(0,0,0,0.85);
            padding: 5px 15px;
            border: 4px solid transparent;
            border-image: var(--stone-border) 30 stretch;
            border-radius: 10px; z-index: 100;
        }

        #leaderboard { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        #leaderboard::-webkit-scrollbar { display: none; }
        
        .rank-item { font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        .score-num { font-size: 18px; color: var(--neon); text-shadow: var(--glow); }

        /* МАГАЗИН - АДАПТИВНАЯ ШИРИНА */
        #shop { 
            width: 320px; /* Уменьшено для мобилок */
            background: rgba(5, 5, 5, 0.95);
            border-left: 6px solid transparent;
            border-image: var(--stone-border) 30 stretch;
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
            z-index: 20; position: relative;
            overflow-y: auto;
        }

        .plate {
            min-height: 80px; background: #0a0a0a; border: 2px solid #333; border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; 
            transition: 0.3s; position: relative; overflow: hidden;
            flex-shrink: 0;
        }
        
        .plate-hint { font-size: 11px; text-align: center; padding: 5px; }

        .grid-upgrades { 
            display: none; width: 100%; grid-template-columns: 1fr 1fr; 
            gap: 4px; padding: 5px; box-sizing: border-box; 
        }
        .plate.unlocked .grid-upgrades { display: grid; }

        .buy-btn {
            background: #111; border: 1px solid #444; color: #fff; 
            padding: 8px 2px; font-size: 9px; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase;
        }

        #news-bar { 
            position: absolute; bottom: 10px; width: 90%; height: 30px; 
            background: rgba(0,0,0,0.8); overflow: hidden; display: flex; align-items: center;
            border-top: 2px solid var(--neon);
        }

        .btn-ad { 
            padding: 8px; font-size: 9px; min-height: 40px;
        }

        /* АДАПТИВНОСТЬ ДЛЯ МАЛЕНЬКИХ ЭКРАНОВ (LANDSCAPE) */
        @media screen and (max-height: 500px) {
            #shop { width: 250px; }
            .score-num { font-size: 16px; }
            .plate { min-height: 60px; }
            #top-hub { top: 5px; padding: 2px 10px; }
            #viewport { border-width: 10px; }
        }

        /* КНОПКА DEBUG ДЛЯ МОБИЛОК (БОЛЬШЕ ОБЛАСТЬ ТЫКА) */
        .cheat-btn { position: absolute; bottom: 50px; left: 10px; opacity: 0.2; width: 40px; height: 40px; }

    </style>
</head>
<body onclick="playInitialMusic()">

    <div id="loading-screen">
        <img src="Logo.png" alt="Logo">
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <div id="rotate-warning">
        <div style="font-size: 40px;">🔄</div>
        <h2>TURN PHONE</h2>
    </div>

    <div id="game-container">
        <div id="viewport" onclick="doTap()">
            <div id="top-hub">
                <button class="btn-mute" onclick="toggleAudio(event)">🔊</button>
                <div class="score-display">
                    <span class="score-num" id="display-score">0</span>
                </div>
                <div id="leaderboard"></div>
            </div>

            <button class="cheat-btn" onclick="addMoney(event)">[D]</button>

            <div id="news-bar">
                <div id="news-txt" style="white-space: nowrap; animation: marquee 20s linear infinite; color: var(--neon); font-size: 12px; width: 100%;">
                    Развивай свою цивилизацию! Кликай для получения энергии...
                </div>
            </div>
        </div>

        <div id="shop">
            <div class="plate locked" id="block1" onclick="tryUnlock(1, 30, 'ui2.png')">
                <div class="plate-hint">Орудия труда<br><b>(30⚡)</b></div>
                <div class="grid-upgrades">
                    <button class="buy-btn" onclick="upgrade(50, 2, 'ui2.png')">Рубило<br>50⚡</button>
                    <button class="buy-btn" onclick="upgrade(200, 5, 'ui3.png')">Копье<br>200⚡</button>
                    <button class="buy-btn" onclick="upgrade(600, 15, 'ui4.png')">Топор<br>600⚡</button>
                    <button class="buy-btn" onclick="upgrade(1500, 1, 'ui5.png')">ОПЫТ<br>1.5к⚡</button>
                </div>
            </div>

            <div class="plate locked" id="block2" onclick="tryUnlock(2, 2000, 'ui6.png')">
                <div class="plate-hint">Огонь<br><b>(2000⚡)</b></div>
                <div class="grid-upgrades">
                    <button class="buy-btn" onclick="upgrade(3000, 100, 'ui6.png')">Трение<br>3к⚡</button>
                    <button class="buy-btn" onclick="upgrade(8000, 300, 'ui7.png')">Огниво<br>8к⚡</button>
                    <button class="buy-btn" onclick="upgrade(20000, 800, 'ui8.png')">Костер<br>20к⚡</button>
                    <button class="buy-btn" onclick="upgrade(50000, 5, 'ui9.png')">ЗНАНИЯ<br>50к⚡</button>
                </div>
            </div>

            <div class="ad-section" style="display: flex; flex-direction: column; gap: 5px; margin-top: auto;">
                 <button class="btn-ad" onclick="startAd(event, 1.5)">
                    <span style="background:var(--gold); color:#000; padding:0 3px; border-radius:2px; font-size:8px;">AD</span> x1.5 БОНУС
                 </button>
                 <button class="btn-ad" onclick="startAd(event, 2.0)" style="border-color: var(--neon); color: var(--neon);">
                    <span style="background:var(--neon); color:#000; padding:0 3px; border-radius:2px; font-size:8px;">AD</span> ПОХОД (x2)
                 </button>
            </div>
        </div>
    </div>

    <div id="page-flip" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; opacity:0; pointer-events:none; z-index:1000; transition:0.2s;"></div>
    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        // Весь JS функционал сохранен (doTap, upgrade, tryUnlock и т.д.)
        // Только добавлена логика скрытия загрузки
        let score = 0, power = 1, totalClicks = 0, adMultiplier = 1;
        let b1Score = 0, b2Score = 0;
        let isMusicPlaying = false;
        let gameStarted = false;

        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 3000);
        });

        function doTap() {
            if(!isMusicPlaying) playInitialMusic();
            gameStarted = true;
            score += (power * adMultiplier);
            totalClicks++;
            updateDisplay();
        }

        function playInitialMusic() {
            document.getElementById('bg-music').play().catch(()=>{});
            isMusicPlaying = true;
        }

        function upgrade(cost, p, bgFile) {
            event.stopPropagation();
            if (score >= cost) {
                score -= cost;
                power += p;
                triggerFlip(bgFile);
                updateDisplay();
            }
        }

        function tryUnlock(num, req, bg) {
            event.stopPropagation();
            if (score >= req) { // Упростил условие для теста: разблокировка за энергию
                let block = document.getElementById('block' + num);
                block.classList.remove('locked');
                block.classList.add('unlocked');
                triggerFlip(bg);
            }
        }

        function triggerFlip(newBg) {
            const flip = document.getElementById('page-flip');
            flip.style.opacity = 0.8;
            setTimeout(() => {
                document.getElementById('viewport').style.backgroundImage = `url('${newBg}')`;
                flip.style.opacity = 0;
            }, 150);
        }

        function updateDisplay() {
            document.getElementById('display-score').innerText = Math.floor(score);
            updateLeaderboard();
            
            // Подсветка доступных покупок
            document.querySelectorAll('.buy-btn').forEach(btn => {
                let cost = parseInt(btn.innerText.match(/\d+/));
                if (btn.innerText.includes('к')) cost *= 1000;
                btn.style.opacity = score >= cost ? "1" : "0.4";
                btn.style.borderColor = score >= cost ? "var(--gold)" : "#444";
            });
        }

        function updateLeaderboard() {
            const players = [
                { name: "Племя", score: b1Score + (totalClicks*0.5) },
                { name: "ВЫ", score: score, isPlayer: true },
                { name: "Орда", score: b2Score + (totalClicks*0.3) }
            ];
            players.sort((a, b) => b.score - a.score);
            const container = document.getElementById('leaderboard');
            container.innerHTML = players.map((p, i) => 
                `<div class="rank-item" style="${p.isPlayer?'color:var(--gold)':''}">#${i+1} ${p.name}: ${Math.floor(p.score)}</div>`
            ).join('');
        }

        function toggleAudio(e) {
            e.stopPropagation();
            const m = document.getElementById('bg-music');
            m.paused ? m.play() : m.pause();
        }

        function addMoney(e) {
            e.stopPropagation();
            score += 5000;
            updateDisplay();
        }

        function startAd(e, m) {
            e.stopPropagation();
            alert("Просмотр рекламы...");
            adMultiplier = m;
            setTimeout(() => { adMultiplier = 1; }, 10000);
        }
    </script>
</body>
</html>
